# HELIX Workflow State Detection Rules
# This file defines how to detect workflow state from artifacts

name: helix
version: 1.0.0
description: Test-driven development workflow with optional discovery and activity-based progression

# Artifact patterns for state detection
# Note: build/deploy execution is managed in the built-in tracker. Static file
# matching is sufficient for canonical docs, but per-story build/deploy state
# should be queried with the `query_command` hints below.
artifact_patterns:
  # Story-level artifacts (vertical slices)
  story:
    frame:
      pattern: "docs/helix/01-frame/user-stories/US-{id}-*.md"
      type: user-story
      activity: frame

    design:
      pattern: "docs/helix/02-design/technical-designs/TD-{id}-*.md"
      type: technical-design
      activity: design

    test:
      pattern: "docs/helix/03-test/test-plans/STP-{id}-*.md"
      type: story-test-plan
      activity: test

    build:
      # No filesystem artifact: build-activity state is detected via tracker queries.
      # The old ".helix/" pattern is removed — that path does not exist in the repo.
      # Concrete per-runtime tracker commands live in each runtime's install guide (DDx: docs/install/ddx.md).
      type: build-issue
      activity: build
      query_only: true
      query_command: "Inspect open tracker issues labeled helix, activity:build, story:US-{id}"

    deploy:
      # No filesystem artifact: deploy-activity state is detected via tracker queries.
      # The old ".helix/" pattern is removed — that path does not exist in the repo.
      # Concrete per-runtime tracker commands live in each runtime's install guide (DDx: docs/install/ddx.md).
      type: deploy-issue
      activity: deploy
      query_only: true
      query_command: "Inspect tracker issues labeled helix, activity:deploy, story:US-{id}. Treat the story as DEPLOY while any matching deploy issue is not closed, including `status: in_progress`."

    iterate:
      type: iterate-evidence
      activity: iterate
      query_only: true
      query_command: "Inspect tracker issues labeled helix, activity:deploy, story:US-{id}. Treat the story as ITERATE only when all matching deploy issues are complete and no matching deploy issue remains not closed. If any matching deploy issue is not closed, including `status: in_progress`, the story remains in DEPLOY. Linked tracker follow-on work is supporting evidence when present; canonical iterate outputs remain shared iteration context and are not queried by story ID."

  # Feature-level artifacts (epics)
  feature:
    frame:
      pattern: "docs/helix/01-frame/features/FEAT-{id}-*.md"
      type: feature-specification
      activity: frame

    design:
      pattern: "docs/helix/02-design/solution-designs/SD-{id}-*.md"
      type: solution-design
      activity: design

    test:
      pattern: "docs/helix/03-test/test-plan-FEAT-{id}.md"
      type: feature-test-plan
      activity: test

    build:
      pattern: "docs/helix/04-build/implementation-plan-FEAT-{id}.md"
      type: feature-implementation
      activity: build

  # Activity-level artifacts (project-wide)
  project:
    discover:
      - pattern: "docs/helix/00-discover/product-vision.md"
        type: product-vision
      - pattern: "docs/helix/00-discover/business-case.md"
        type: business-case

    frame:
      - pattern: "docs/helix/01-frame/prd.md"
        type: product-requirements
      - pattern: "docs/helix/01-frame/principles.md"
        type: principles
      - pattern: "docs/helix/01-frame/stakeholder-map.md"
        type: stakeholder-map

    design:
      - pattern: "docs/helix/02-design/architecture.md"
        type: architecture
      - pattern: "docs/helix/02-design/contracts/*.md"
        type: api-contracts

    test:
      - pattern: "docs/helix/03-test/test-plan.md"
        type: master-test-plan
      - pattern: "docs/helix/03-test/test-procedures.md"
        type: test-procedures

    build:
      - pattern: "docs/helix/04-build/implementation-plan.md"
        type: master-implementation

# Activity detection strategy
activity_detection:
  strategy: highest-artifact  # Use the highest activity artifact found
  order: [discover, frame, design, test, build, deploy, iterate]

  # Additional checks for activity determination
  additional_checks:
    - type: test-status
      description: Check if tests are passing to determine build vs test activity
      test_command: "make test"
      passing_activity: build
      failing_activity: test

    - type: deployment-status
      description: Check if deployed to determine deploy vs build activity
      check_file: "docs/helix/05-deploy/deployment-record.md"
      exists_activity: deploy
      missing_activity: build

# Artifact naming conventions
naming_conventions:
  story:
    pattern: "{prefix}-{id}-{name}"
    examples:
      - "US-001-initialize-ddx"
      - "TD-001-initialize-ddx"
      - "STP-001-initialize-ddx"
    prefixes:
      US: "User Story (Frame)"
      TD: "Technical Design (Design)"
      STP: "Story Test Plan (Test)"
      ISSUE: "Execution tracked in built-in tracker"
      ITERATE: "All matching deploy issue(s) complete with no matching deploy issue remaining not closed, plus optional tracker-backed follow-on work; shared iterate outputs remain iteration context (no numbered story file)"

  feature:
    pattern: "{prefix}-{id}-{name}"
    examples:
      - "FEAT-001-mcp-server-management"
      - "SD-001-mcp-management"
    prefixes:
      FEAT: "Feature Specification"
      SD: "Solution Design"

# State transition rules
transitions:
  story:
    frame_to_design:
      requires: ["US-{id} exists"]
      creates: "TD-{id}"

    design_to_test:
      requires: ["TD-{id} exists"]
      creates: "STP-{id}"

    test_to_build:
      requires: ["STP-{id} exists", "tests failing"]
      creates: "build issue(s) in tracker"

    build_to_deploy:
      requires: ["build issue(s) exist", "tests passing"]
      creates: "deploy issue(s) in tracker"

    deploy_to_iterate:
      requires: ["deploy issue(s) exist", "all deploy issue(s) complete", "no matching deploy issue remains not closed"]
      creates: "story enters ITERATE only after all deploy issue(s) are complete and no matching deploy issue remains not closed; optional tracker follow-on work may capture additional iteration evidence"

# Validation rules
validation:
  story_progression:
    - rule: "TD cannot exist without US"
      check: "If TD-{id} exists, then US-{id} must exist"

    - rule: "STP cannot exist without TD"
      check: "If STP-{id} exists, then TD-{id} must exist"

    - rule: "Build issue work should not start without STP"
      check: "If a build issue query returns work for story {id}, then STP-{id} must exist"

  cross_references:
    - rule: "TD must reference US"
      check: "TD-{id} file contains [[US-{id}]]"

    - rule: "STP must reference TD"
      check: "STP-{id} file contains [[TD-{id}]]"

# Workflow metadata
metadata:
  supports_vertical_slices: true
  supports_parallel_stories: true
  enforces_activity_gates: true
  test_driven: true
  documentation_first: true

# Integration with HELIX execution. These are runtime-neutral action
# descriptions; concrete per-runtime commands live in each runtime's install
# guide (DDx: docs/install/ddx.md).
execution_integration:
  commands:
    implementation:
      description: "Execute one ready HELIX execution issue"
      example: "the runtime's single-work-item execution command (DDx: docs/install/ddx.md)"

    check:
      description: "Decide whether to implement, align, backfill, wait, ask for guidance, or stop"
      example: "/helix check"

    run:
      description: "Drain the ready queue"
      example: "the runtime's queue-drain command (DDx: docs/install/ddx.md)"
