# Metadata for Technical Design (Story-Level)

artifact:
  name: Technical Design
  id: technical-design
  type: document
  activity: design
  level: story  # This is a story-level artifact

description: |
  Story-specific technical design that details HOW to implement a single
  user story within the context of the broader solution architecture.
  This enables vertical slicing by providing implementation details for
  one story at a time: changed components, files, interfaces, data model,
  tests, migration/rollback, and implementation sequence.

output:
  location: docs/helix/02-design/technical-designs/TD-{id}-{name}.md
  format: markdown
  naming: TD-{story-number}-{story-name}.md
  examples:
    - TD-036-list-mcp-servers.md
    - TD-037-install-mcp-server.md

validation:
  required_sections:
    - technical_approach
    - component_changes
    - testing

  quality_checks:
    - check: acceptance_criteria_realized
      description: Each governing-story AC-ID (US-{n}-AC{m}) is realized by the technical changes; AC text is not restated here (ADR-009 — AC ownership lives in user-stories).
      severity: blocking

    - check: api_contracts_defined
      description: API changes must include full specifications
      severity: blocking

    - check: test_approach_specified
      description: Testing strategy must be defined
      severity: warning

    - check: security_considered
      description: Security requirements must be addressed
      severity: blocking

    - check: rollback_plan_exists
      description: Rollback strategy should be defined
      severity: warning

  automated_checks:
    - pattern: "\\[\\[US-\\d{3}-"
      expected: ">=1"
      message: Must reference the user story

    - pattern: "\\[\\[SD-\\d{3}-"
      expected: ">=1"
      message: Must reference the solution design

    - pattern: "US-\\d{3}-AC\\d+"
      expected: ">=1"
      message: Must reference at least one governing story AC-ID (US-{n}-AC{m}); do not restate AC text (ADR-009)

cross_references:
  must_reference:
    - User Story (US-XXX)
    - Solution Design (SD-XXX)

  may_reference:
    - Feature Specification (FEAT-XXX)
    - API Contracts
    - Data Models
    - Other Technical Designs (TD-XXX)

variables:
  - name: story_id
    description: User story ID (e.g., 036)
    required: true

  - name: story_name
    description: User story descriptive name
    required: true

  - name: feature_id
    description: Parent feature ID
    required: true

prompts:
  generation: prompt.md
  review: |
    Review this technical design for:
    1. Completeness of acceptance criteria mapping
    2. Clarity of technical approach
    3. Specificity of implementation details
    4. Adequacy of test approach
    5. Security considerations
    6. Rollback capability

template:
  file: template.md
  sections:
    - technical_approach: "How to implement"
    - component_changes: "What needs to be modified"
    - api_design: "Interface specifications"
    - data_model: "Schema changes"
    - testing: "How to verify; reference governing-story AC-IDs (US-{n}-AC{m})"

example:
  file: example.md

references:
  - title: "Google Engineering Practices: Small CLs"
    file: docs/resources/google-small-cls.md
    relationship: "Grounds bounded story-level implementation slices with tests and rollback"
  - title: "Cucumber Executable Specifications"
    file: docs/resources/cucumber-executable-specifications.md
    relationship: "Grounds acceptance-criteria-to-test mapping"

workflow:
  creation_order: 1  # First artifact in design activity for a story
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Technical Lead
    - Senior Developer

relationships:
  informed_by:
    - user-stories
    - solution-design
    - feature-specification

  informs:
    - test-plan
    - implementation-plan

  references:
    - architecture

story_progression:
  previous: US-XXX (Frame)
  current: TD-XXX (Design)
  next: TP-XXX (Test)

tags:
  - story-level
  - vertical-slice
  - technical-design
  - implementation

version: 1.0.0
last_updated: 2024-01-19
