artifact:
  name: Security Architecture
  id: security-architecture
  type: document
  activity: design

description: |
  Design-level security architecture that maps trust boundaries, controls,
  and security decisions to implementation and testing.

output:
  location: docs/helix/02-design/security-architecture.md
  format: markdown
  naming: security-architecture.md

validation:
  required_sections:
    - decision
    - trust_boundaries
    - control_mapping
    - identity_and_access
    - data_protection
    - logging_and_monitoring
    - residual_risk
    - security_test_hooks

  quality_checks:
    - check: boundaries_explicit
      description: Trust boundaries must be named and described
      severity: blocking
    - check: control_mapping_present
      description: Every major risk should map to a concrete control
      severity: blocking
    - check: test_hooks_defined
      description: The security architecture must point to verification or tests
      severity: warning

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "OWASP Application Security Verification Standard"
    file: docs/resources/owasp-asvs.md
    relationship: "Grounds verifiable application security controls"
  - title: "OWASP Threat Modeling Cheat Sheet"
    file: docs/resources/owasp-threat-modeling-cheat-sheet.md
    relationship: "Grounds trust boundaries, data flows, threats, assumptions, and mitigations"
  - title: "NIST Privacy Framework"
    file: docs/resources/nist-privacy-framework.md
    relationship: "Grounds privacy-risk controls and data-processing constraints"

workflow:
  creation_order: 2
  review_cycles: 2
  approval_required: true
  approvers:
    - Security Champion
    - Technical Lead

relationships:
  informed_by:
    - security-requirements
    - threat-model
    - architecture
  informs:
    - technical-design
    - test-plan
    - security-tests

tags:
  - design
  - security
  - architecture
  - controls

version: 1.0.0
last_updated: 2026-04-09
