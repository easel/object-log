# Metadata for Data Architecture

artifact:
  name: Data Architecture
  id: data-architecture
  type: document
  activity: design

description: |
  Captures the data pipeline architecture, medallion topology, streaming vs batch
  semantics, processing frameworks, governance model, and quality contracts. The
  data architecture document defines the structural and operational decisions that
  guide implementation of data products: source integration patterns, transformation
  logic organization, data quality enforcement, access control, and Databricks
  platform use (compute, storage, catalog, SDP expectations).

output:
  location: docs/helix/02-design/data-architecture.md
  format: markdown
  naming: data-architecture.md
  examples:
    - data-architecture.md

validation:
  required_sections:
    - overview
    - medallion_topology
    - data_flow
    - processing_semantics
    - pipeline_level_quality_contracts
    - governance_and_access_control
    - platform_design
    - decisions_and_tradeoffs

  quality_checks:
    - check: medallion_layers_defined
      description: Bronze, Silver, and Gold layers must be defined with transformation scope and purpose
      severity: blocking

    - check: quality_contracts_explicit
      description: Data quality expectations must be written as testable EXPECT rules per layer
      severity: blocking

    - check: access_control_modeled
      description: Row-level and column-level access control must be specified for each layer/table
      severity: blocking

    - check: streaming_vs_batch_explicit
      description: Each data flow must specify whether it is streaming, batch, or incremental batch with rationale
      severity: blocking

    - check: sla_and_freshness_specified
      description: Freshness SLA and processing latency targets must be documented per data flow
      severity: warning

    - check: compute_and_storage_sized
      description: Databricks cluster size, DBU budget, storage tier, and scaling strategy must be sketched
      severity: warning

  automated_checks:
    - pattern: "\\[TBD\\]|\\[TODO\\]|\\[NEEDS CLARIFICATION\\]"
      expected: 0
      message: Remove all unresolved markers before approval

    - pattern: "EXPECT|quality|SLA|freshness"
      expected: ">0"
      message: Data architecture must name quality expectations and SLAs

variables:
  - name: data_product_name
    description: Name of the data product being architected
    required: true

  - name: source_systems
    description: List of upstream data sources
    required: true

  - name: primary_consumers
    description: Teams or systems consuming the data
    required: true

  - name: freshness_target
    description: Expected data freshness (e.g., "hourly", "daily", "real-time")
    required: true

  - name: quality_metrics
    description: Key quality dimensions to enforce (completeness, timeliness, accuracy)
    required: false

  - name: compute_budget
    description: Estimated DBU budget or cluster configuration
    required: false

prompts:
  generation: prompt.md
  review: |
    Review this data architecture for:
    1. Clear medallion topology with layer responsibilities
    2. Explicit processing semantics (streaming, batch, incremental)
    3. Data quality contracts written as EXPECT rules
    4. Access control strategy aligned to consumer needs
    5. Databricks platform choices justified (compute, storage, catalog)
    6. Freshness SLA achievable with the proposed design
    7. Cost and scalability implications understood
    8. Tradeoffs between consistency, availability, and timeliness documented

template:
  file: template.md
  sections:
    - overview: "System context, primary data flows, and Databricks platform fit"
    - medallion_topology: "Bronze (raw ingestion), Silver (transformed), Gold (consumption) layer strategy"
    - data_flow: "Diagrams or descriptions of how data moves through layers"
    - processing_semantics: "Is this streaming, batch, or incremental batch? Why?"
    - pipeline_level_quality_contracts: "EXPECT rules per layer; what makes data trustworthy?"
    - governance_and_access_control: "Who can access what? Row-level, column-level, catalog policies"
    - platform_design: "Compute tier, storage strategy, catalog/schema organization, SDP expectations"
    - decisions_and_tradeoffs: "Why these choices? What were the alternatives?"

examples:
  - file: example.md
    description: Customer 360 data architecture with real-time Salesforce/Stripe ingestion, medallion layers, quality contracts, and UC governance

relationships:
  informed_by:
    # `prd` covers both framings via its `kind` field (ADR-008): `kind: data`
    # supplies data-source, consumer, quality, and platform context; default
    # `kind: product` supplies general product framing.
    - prd
    - data-design

  informs:
    - data-quality-expectations
    - technical-design
    - solution-design

  referenced_by:
    - data-quality-expectations
    - implementation-plan
    - runbook

references:
  - title: "Databricks Lakehouse Architecture"
    file: docs/resources/databricks-lakehouse-architecture.md
    relationship: "Grounds unified storage, compute, and governance model for data products"

  - title: "Databricks Lakehouse Medallion Architecture"
    file: docs/resources/databricks-lakehouse-medallion-architecture.md
    relationship: "Grounds Bronze/Silver/Gold transformation semantics and layer isolation"

  - title: "Databricks Auto Loader and Streaming Tables"
    file: docs/resources/databricks-auto-loader.md
    relationship: "Grounds incremental data ingestion and streaming transformation patterns"

  - title: "Databricks Unity Catalog and SDP (Semantic Data Platform)"
    file: docs/resources/databricks-sdp.md
    relationship: "Grounds fine-grained governance, EXPECT clauses, and data quality enforcement"

  - title: "Data Product Thinking and Domain-Driven Data Design"
    file: docs/resources/data-mesh.md
    relationship: "Grounds decoupled data architecture and consumer-centric design"

  - title: "dbt Best Practices for Transformation Logic"
    file: docs/resources/dbt-best-practices.md
    relationship: "Grounds modular, testable transformation design across medallion layers"

workflow:
  creation_order: 1
  review_cycles: 2
  approval_required: true
  approvers:
    - Data Engineering Lead
    - Data Platform Owner
    - Solution Architect

tags:
  - data-engineering
  - architecture
  - databricks
  - medallion
  - pipeline

version: 1.0.0
last_updated: 2026-05-18
