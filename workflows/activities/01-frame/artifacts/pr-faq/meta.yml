# Metadata for PR-FAQ (Press Release + Frequently Asked Questions)

artifact:
  name: PR-FAQ
  id: pr-faq
  type: document
  activity: frame

description: |
  Working-backwards launch narrative and internal FAQ that test customer
  outcome, mechanism, autonomy boundary, feasibility, economics, and scope.

output:
  location: docs/helix/01-frame/pr-faq.md
  format: markdown
  naming: pr-faq.md

validation:
  required_sections:
    - press_release
    - internal_product_argument
    - faq
    - downstream_projection

  quality_checks:
    - check: core_thesis_plain
      description: Core thesis is a single plain-language claim, not a slogan or list of features
      severity: blocking

    - check: mechanism_explicit
      description: Mechanism explains why the thesis should be true and can seed PRD requirements or research validation
      severity: blocking

    - check: quality_model_actionable
      description: Quality model names attributes with observable evidence or checks, not vague virtues
      severity: blocking

    - check: decision_autonomy_boundary_controlled
      description: Decision/autonomy boundary distinguishes safe progress, reversible assumptions, decomposition, and human decision points
      severity: blocking

    - check: press_release_names_specific_customer
      description: Press release names a specific customer segment and use case, not a generic "users"
      severity: blocking

    - check: customer_quote_in_their_words
      description: Customer quote sounds like the imagined customer would actually say it — names the outcome they got, not the product's features
      severity: blocking

    - check: press_release_under_350_words
      description: Press release section stays under ~350 words (Amazon convention)
      severity: warning

    - check: faq_surfaces_feasibility_risk
      description: Internal FAQ surfaces at least one credible feasibility, technical, or scaling risk
      severity: blocking

    - check: faq_surfaces_economic_question
      description: Internal FAQ confronts pricing, unit economics, or funding plausibility
      severity: blocking

    - check: faq_names_what_kills_project
      description: Internal FAQ includes a "what would cause us to abandon this?" or equivalent kill-criteria question
      severity: blocking

    - check: external_faq_covers_alternatives
      description: External FAQ explicitly compares to existing alternatives and explains who this is NOT for
      severity: blocking

    - check: not_in_v1_explicit
      description: External or internal FAQ explicitly states what is out of scope for v1
      severity: blocking

    - check: experiments_named
      description: At least one internal FAQ names an experiment or validation step required before commit
      severity: warning

    - check: no_marketing_fluff
      description: Press release reads like a wire-service story, not a sales deck — no "revolutionary", "game-changing", "world-class"
      severity: warning

    - check: dates_and_numbers_specific
      description: Availability, pricing, and timelines use specific dates and numbers, not "soon" or "competitive"
      severity: warning

    - check: downstream_projection_explicit
      description: Downstream projection names the artifacts or public pages that should inherit the PR-FAQ argument
      severity: blocking

  automated_checks:
    - pattern: "\\[TBD\\]|\\[TODO\\]|\\[NEEDS CLARIFICATION"
      expected: 0
      message: Remove all unresolved markers before approval

    - pattern: "\\[BRACKETED PLACEHOLDER"
      expected: 0
      message: Replace template placeholders with real content

variables:
  - name: product_name
    description: Name of the product being launched
    required: true

  - name: launch_date
    description: Imagined launch date used in the press release dateline
    required: true

  - name: target_customer
    description: Specific customer segment the press release is written to
    required: true

  - name: company_name
    description: Company or team issuing the release
    required: true

prompts:
  generation: prompt.md
  review: |
    Review this PR-FAQ for:
    1. Whether the core thesis is a single plain-language claim
    2. Whether the mechanism explains why the thesis should be true
    3. Whether the quality model can become requirements or checks
    4. Whether the decision/autonomy boundary avoids both overreach and lazy escalation
    5. Whether the press release commits to a specific customer outcome
    6. Whether the customer quote sounds like a real customer, not marketing
    7. Whether the FAQ confronts the actual hard questions (economics, feasibility, adoption)
    8. Whether kill criteria and v1 scope boundaries are explicit
    9. Whether the open questions and experiments are concrete enough to seed a PRD
    10. Whether downstream projection targets are explicit enough to prevent parallel copy drift

template:
  file: template.md
  sections:
    - press_release: "Write the headline last; it should be the sharpest line in the document"
    - internal_product_argument: "Owns the reusable thesis, mechanism, quality model, and decision/autonomy boundary"
    - core_thesis: "One sentence; plain, falsifiable, and reusable"
    - mechanism: "Name what makes the thesis true"
    - quality_model: "Attributes with evidence or checks"
    - decision_autonomy_boundary: "Define progress, assumptions, decomposition, and human decision points"
    - the_problem: "Use the customer's words, not yours"
    - customer_quote: "Make it about the outcome, not the product"
    - internal_faqs: "If a question feels uncomfortable to write, it belongs here"
    - downstream_projection: "List the artifacts or public pages that should inherit this argument"

references:
  - title: "Amazon / AWS Working Backwards PR-FAQ"
    file: docs/resources/amazon-working-backwards-prfaq.md
    relationship: "Primary source for press release as a concise customer narrative and FAQ split between customer and internal questions"
  - title: "Working Backwards PR-FAQ Template Guidance"
    file: docs/resources/working-backwards-prfaq-template.md
    relationship: "Independent template guidance for customer-backward framing, review, and iteration"

examples:
  - file: example.md
    description: Sample PR-FAQ for DepositMatch, derived from the product vision and PRD examples

workflow:
  creation_order: 0.5
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Product Owner
    - Sponsor
    - Technical Lead

relationships:
  informs:
    - prd
    - principles
    - stakeholder-map
    - feature-specification

  referenced_by:
    - prd
    - solution-design
    - feature-specification

tags:
  - business
  - vision
  - validation
  - framing
  - customer
  - working-backwards

version: 1.0.0
last_updated: 2026-05-01
