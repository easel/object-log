# Metadata for Security Requirements

artifact:
  name: Security Requirements
  id: security-requirements
  type: document
  activity: frame

description: |
  Testable security requirements for authentication, authorization, data
  protection, privacy, validation, logging, compliance, and risk controls.

output:
  location: docs/helix/01-frame/security-requirements.md
  format: markdown
  naming: security-requirements.md

validation:
  required_sections:
    - required_controls
    - compliance_requirements
    - security_risks

  quality_checks:
    - check: all_requirements_have_acceptance_criteria
      description: Every security requirement must have testable acceptance criteria
      severity: blocking
    - check: compliance_requirements_mapped
      description: All applicable compliance requirements must be mapped to controls
      severity: blocking
    - check: risk_levels_defined
      description: Risk levels must be defined for each threat area
      severity: warning
    - check: testable_criteria_specified
      description: Acceptance criteria must be verifiable through testing
      severity: warning

variables:
  - name: project_name
    description: Name of the project
    required: true
  - name: project_type
    description: Type of project (web app, API, mobile, etc.)
    required: true
  - name: data_types
    description: Types of data the system will handle
    required: true
  - name: compliance_requirements
    description: Applicable regulatory and compliance frameworks
    required: true
  - name: deployment_environment
    description: Target deployment environment
    required: true
  - name: industry_sector
    description: Industry sector for threat context
    required: false
  - name: geographic_scope
    description: Geographic regions of operation
    required: false
  - name: risk_tolerance
    description: Organization's risk tolerance level
    required: false
  - name: existing_security_controls
    description: Security controls already in place
    required: false

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "OWASP Application Security Verification Standard"
    file: docs/resources/owasp-asvs.md
    relationship: "Grounds application security requirements and verification expectations"
  - title: "FTC Safeguards Rule"
    file: docs/resources/ftc-safeguards-rule.md
    relationship: "Grounds financial customer information safeguards and applicability caveats"
  - title: "NIST Privacy Framework"
    file: docs/resources/nist-privacy-framework.md
    relationship: "Grounds privacy risk management and data-processing controls"

workflow:
  creation_order: 3
  review_cycles: 2
  approval_required: true
  approvers:
    - Product Owner
    - Security Champion

relationships:
  informs:
    - solution-design
    - threat-model
    - compliance-requirements
  referenced_by:
    - test-plan

tags:
  - security
  - requirements
  - compliance
  - risk

version: 1.0.0
last_updated: 2024-01-14
