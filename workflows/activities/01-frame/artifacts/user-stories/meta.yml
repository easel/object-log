# Metadata for User Stories

artifact:
  name: User Stories
  id: user-stories
  type: collection
  activity: frame

description: |
  Stable design artifacts defining vertical user journeys through feature
  behavior. Each story traces one persona from trigger to outcome, references
  parent feature requirements, and carries acceptance criteria concrete enough
  to drive test-first implementation. Stories are governing references; tracker
  issues reference them, not the other way around.

output:
  location: docs/helix/01-frame/user-stories/
  format: markdown
  naming: US-{number}-{slug}.md
  structure: one-per-story

validation:
  required_sections:
    - story
    - context
    - walkthrough
    - acceptance_criteria
    - edge_cases
    - test_scenarios
    - dependencies

  quality_checks:
    - check: persona_specific
      description: Story names a specific persona from the PRD
      severity: blocking

    - check: criteria_testable
      description: Every acceptance criterion is independently testable
      severity: blocking

    - check: test_scenarios_concrete
      description: Test scenarios include concrete values
      severity: blocking

    - check: walkthrough_complete
      description: Walkthrough traces a complete path from trigger to outcome
      severity: blocking

    - check: edge_cases_present
      description: At least one edge case documented
      severity: warning

  automated_checks:
    - pattern: "\\*\\*As a\\*\\*"
      expected: ">0"
      message: Story must name the persona

    - pattern: "\\*\\*I want\\*\\*"
      expected: ">0"
      message: Story must name the user's goal

    - pattern: "\\*\\*So that\\*\\*"
      expected: ">0"
      message: Story must name the value or outcome

    - pattern: "Given .* [Ww]hen "
      expected: ">0"
      message: Must include testable Given/When acceptance criteria

    - pattern: "[Tt]hen "
      expected: ">0"
      message: Must include observable outcomes in acceptance criteria

variables:
  - name: feature_id
    description: FEAT-XXX identifier for parent feature
    required: true

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "Atlassian User Stories"
    file: docs/resources/atlassian-user-stories.md
    relationship: "Grounds persona-goal-value story framing and acceptance criteria"
  - title: "Cucumber Executable Specifications"
    file: docs/resources/cucumber-executable-specifications.md
    relationship: "Grounds observable Given/When/Then acceptance criteria without prescribing tooling"

workflow:
  creation_order: 3
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Product Owner

relationships:
  derived_from:
    - prd
    - feature-specification
  informs:
    - solution-design
    - story-test-plan

tracking:
  id_format: US-NNN
  id_scope: project

tags:
  - requirements
  - vertical-slice
  - design-artifact
