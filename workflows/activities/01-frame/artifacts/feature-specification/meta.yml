# Metadata for Feature Specification

artifact:
  name: Feature Specification
  id: feature-specification
  type: collection
  activity: frame

description: |
  Feature-level authority document that translates PRD requirements into
  precise behavior, boundaries, functional areas, non-functional expectations,
  edge cases, and feature-specific success measures. Acceptance criteria live
  in user-stories (ADR-009); the feature spec carries FR-IDs and the
  decomposition test but does not define AC. Broad product-surface, workflow,
  IA, and documentation features must state the ideal future state and map
  functional areas before requirements.

output:
  location: docs/helix/01-frame/features/
  format: markdown
  naming: FEAT-{number}-{title-with-hyphens}.md
  structure: per-feature

validation:
  required_sections:
    - problem_statement
    - requirements
    - edge_cases_and_error_handling
    - success_metrics
    - constraints_and_assumptions
    - out_of_scope

  quality_checks:
    - check: requirements_testable
      description: All requirements must be testable
      severity: blocking

    - check: future_state_first
      description: Broad feature specs must define the desired future state before optimizing around current problems
      severity: blocking

    - check: functional_areas_separated
      description: Multi-surface features must group requirements by functional area
      severity: blocking

    - check: similar_domain_objects_separated
      description: Similar domain objects must be defined separately before requirements are written
      severity: warning

    - check: nfr_measurable
      description: NFRs must have measurable criteria
      severity: blocking

    - check: edge_cases_identified
      description: Edge cases must be documented
      severity: warning

    - check: no_implementation_details
      description: Should not specify HOW, only WHAT
      severity: warning

  automated_checks:
    - pattern: "\\[NEEDS CLARIFICATION"
      expected: 0
      message: Resolve all clarification markers for P0 features
      severity: blocking_for_p0

    - pattern: "must|shall|will"
      expected: ">0"
      message: Use clear requirement language

variables:
  - name: feature_id
    description: FEAT-XXX identifier
    required: true

  - name: feature_title
    description: Descriptive feature name
    required: true

  - name: priority
    description: P0/P1/P2 priority level
    required: true

prompts:
  generation: prompt.md
  clarification: |
    Mark unclear requirements with [NEEDS CLARIFICATION: specific question]
    Focus on WHAT not HOW
    Make everything testable
    For broad product-surface, workflow, IA, or documentation features, define ideal future state and functional areas before requirements

template:
  file: template.md
  clarification_markers: true
  focus: future_state_and_requirements_not_implementation

references:
  - title: "IBM Requirements Management"
    file: docs/resources/ibm-requirements-management.md
    relationship: "Grounds traceable, prioritized, verifiable requirements"
  - title: "Cucumber Executable Specifications"
    file: docs/resources/cucumber-executable-specifications.md
    relationship: "Grounds concrete examples as readable acceptance specifications without prescribing implementation"

examples:
  - file: example.md
    description: DepositMatch CSV import and column mapping feature specification

workflow:
  creation_order: 4
  review_cycles: 2-3
  approval_required: true
  approvers:
    - Product Owner
    - Technical Lead
    - QA Lead

relationships:
  derived_from:
    - prd

  informs:
    - user-stories
    - solution-design
    - contract
    - test-plan

  registered_in:
    - feature-registry

specification_rules:
  language:
    - use: "The system must..."
    - avoid: "The system should..."
    - avoid: "Using PostgreSQL..."
    - avoid: "Implemented with..."
    - avoid: "A flat requirements list for multi-surface features"

  requirements:
    functional:
      prefix: FR-
      numbering: sequential
      area_prefixes_allowed: true
    non_functional:
      prefix: NFR-
      categories:
        - performance
        - security
        - scalability
        - usability
        - reliability

tracking:
  id_format: FEAT-XXX
  id_scope: project
  status_values:
    - draft
    - in_review
    - approved
    - superseded

tags:
  - requirements
  - specification
  - features
  - functional
  - non-functional

version: 1.0.0
last_updated: 2024-01-14
