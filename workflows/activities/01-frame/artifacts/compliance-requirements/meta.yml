# Metadata for Compliance Requirements

artifact:
  name: Compliance Requirements
  id: compliance-requirements
  type: document
  activity: frame

description: |
  Obligation-to-control map for applicable regulations, standards,
  contractual duties, data handling, owners, evidence, and validation.

output:
  location: docs/helix/01-frame/compliance-requirements.md
  format: markdown
  naming: compliance-requirements.md

validation:
  required_sections:
    - applicable_regulations
    - compliance_requirements_matrix
    - data_classification_and_handling
    - implementation_plan

  quality_checks:
    - check: applicability_assessed
      description: Regulatory applicability is assessed with assumptions and counsel-review gaps
      severity: blocking
    - check: requirements_mapped_to_implementation
      description: Each compliance requirement must map to an implementation control
      severity: blocking
    - check: risk_assessment_completed
      description: Compliance risk assessment must be completed
      severity: warning
    - check: timeline_defined
      description: Implementation and audit timelines must be defined
      severity: warning

variables:
  - name: business_sector
    description: Business sector for regulatory context
    required: true
  - name: operating_jurisdictions
    description: Jurisdictions where the system will operate
    required: true
  - name: data_types_processed
    description: Types of data the system processes
    required: true
  - name: customer_types
    description: Types of customers (B2B, B2C, government, etc.)
    required: true
  - name: deployment_locations
    description: Geographic locations of deployment infrastructure
    required: true
  - name: company_size
    description: Company size for regulatory threshold determination
    required: false
  - name: public_private_status
    description: Whether the company is publicly traded
    required: false
  - name: existing_compliance_obligations
    description: Compliance frameworks already in place
    required: false
  - name: risk_tolerance
    description: Organization's risk tolerance level
    required: false

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "FTC Safeguards Rule"
    file: docs/resources/ftc-safeguards-rule.md
    relationship: "Grounds financial customer information security obligations and applicability caveats"
  - title: "NIST Privacy Framework"
    file: docs/resources/nist-privacy-framework.md
    relationship: "Grounds privacy risk management, data processing, controls, and validation evidence"

workflow:
  creation_order: 4
  review_cycles: 2
  approval_required: true
  approvers:
    - Compliance Officer
    - Legal Counsel

relationships:
  informs:
    - solution-design
  referenced_by:
    - test-plan

tags:
  - compliance
  - regulatory
  - legal
  - risk

version: 1.0.0
last_updated: 2024-01-14
