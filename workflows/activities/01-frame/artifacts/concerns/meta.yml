# Metadata for Project Concerns

artifact:
  name: Project Concerns
  id: concerns
  type: singleton
  activity: frame

description: |
  Declares the project's active cross-cutting concerns: technology stacks,
  quality attributes, data rules, security posture, UX conventions, operating
  practices, and project-specific overrides. A concern is active only when it
  changes downstream work across more than one artifact or implementation area.
  Concerns are selected from `workflows/concerns/` or
  declared as project-local entries with area scope and practices.

output:
  location: docs/helix/01-frame/concerns.md
  format: markdown
  naming: concerns.md
  structure: singleton

validation:
  required_sections:
    - active_concerns
    - area_labels

  quality_checks:
    - check: concerns_are_resolved
      description: Each selected concern must either exist in workflows/concerns/ or be declared as a project-local concern with scope and practices
      severity: blocking

    - check: overrides_cite_adrs
      description: Practice overrides should reference a governing ADR
      severity: warning

    - check: no_unresolved_conflicts
      description: Practice conflicts between concerns must be resolved
      severity: blocking

template:
  file: template.md

example:
  file: example.md

prompts:
  generation: prompt.md

references:
  - title: "Microsoft Azure Well-Architected Framework"
    file: docs/resources/microsoft-azure-well-architected-framework.md
    relationship: "Grounds cross-cutting quality and operational concerns as actionable practices with tradeoffs"
  - title: "SEI Reasoning About Software Quality Attributes"
    file: docs/resources/sei-quality-attribute-scenarios.md
    relationship: "Grounds quality attributes as concrete scenarios and practices that shape architecture"

tags:
  - concerns
  - cross-cutting
  - tech-stack
  - quality-attributes
  - practices

version: 1.0.0
