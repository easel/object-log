# Metadata for Product Requirements Document (PRD)

artifact:
  name: Product Requirements Document
  id: prd
  type: document
  activity: frame

description: |
  Product-scope authority document that translates vision into prioritized,
  measurable requirements, success metrics, non-goals, assumptions, and
  acceptance sketches. The `kind` field selects the framing variant: the
  default `product` variant frames general product requirements; the `data`
  variant frames a data product (pipeline, warehouse, data platform, or data
  service) with data sources, consumers, quality contracts, and platform
  context. The shape of the artifact is unified; the framing is parameterized.

kind:
  enum:
    - product
    - data
  default: product
  description: |
    Framing variant for this PRD. `product` (default) frames general product
    requirements. `data` frames a data product with data-source, consumer,
    quality-contract, and platform-context guidance. New variants require an
    ADR (see ADR-008).

output:
  location: docs/helix/01-frame/prd.md
  format: markdown
  naming: prd.md

validation:
  # Aligned to prd/template.md section headings (2026-05-24: fixed pre-existing template↔meta drift).
  required_sections:
    - summary
    - problem_and_goals
    - users_and_scope
    - requirements
    - functional_requirements
    - acceptance_test_sketches
    - risks
    - success_criteria

  quality_checks:
    - check: metrics_quantified
      description: All success metrics must have numeric targets
      severity: blocking

    - check: personas_validated
      description: User personas should be based on actual research
      severity: warning

    - check: requirements_prioritized
      description: Requirements must be categorized as P0/P1/P2
      severity: blocking

    - check: risks_mitigated
      description: Each risk must have a mitigation strategy
      severity: warning

  automated_checks:
    - pattern: "\\[NEEDS CLARIFICATION"
      expected: 0
      message: Remove all clarification markers before approval

    - pattern: "P0|Must Have"
      expected: ">0"
      message: PRD must define at least one P0 requirement

variables:
  - name: product_name
    description: Name of the product being developed
    required: true

  - name: target_launch_date
    description: Target date for product launch
    required: false

  - name: primary_stakeholder
    description: Primary stakeholder or product owner
    required: true

prompts:
  generation: prompt.md
  review: |
    Review this PRD for:
    1. Clarity of problem statement
    2. Measurability of success metrics
    3. Completeness of requirements
    4. Identification of risks
    5. Alignment with business goals

template:
  file: template.md
  sections:
    - executive_summary: "Write this last"
    - problem_statement: "Start here"
    - success_metrics: "Make specific and measurable"

examples:
  - file: example.md
    description: Sample PRD for DepositMatch, derived from the product vision example

workflow:
  creation_order: 1
  review_cycles: 2-3
  approval_required: true
  approvers:
    - Product Owner
    - Technical Lead
    - Key Stakeholders

relationships:
  informs:
    - principles
    - feature-specification
    - user-stories
    - feature-registry

  referenced_by:
    - solution-design
    - test-plan

references:
  - title: "Atlassian Product Requirements Document"
    file: docs/resources/atlassian-prd.md
    relationship: "Grounds agile PRD scope, shared understanding, assumptions, and out-of-scope guidance"
  - title: "Aha! Product Requirements Document Template"
    file: docs/resources/aha-prd-template.md
    relationship: "Grounds concise cross-functional PRD structure and scope guidance"
  - title: "IBM Requirements Management"
    file: docs/resources/ibm-requirements-management.md
    relationship: "Grounds measurable, prioritized, traceable requirements and verification discipline"

tags:
  - business
  - requirements
  - product-scope
  - traceability

version: 1.0.0
last_updated: 2024-01-14
