# Metadata for Stakeholder Map

artifact:
  name: Stakeholder Map
  id: stakeholder-map
  type: document
  activity: frame

description: |
  Stakeholder and decision-rights map for roles, interests, influence,
  engagement, RACI ownership, communication cadence, and escalation paths.

output:
  location: docs/helix/01-frame/stakeholder-map.md
  format: markdown
  naming: stakeholder-map.md
  update_frequency: monthly

validation:
  required_sections:
    - primary_stakeholders_high_influence_high_interest
    - secondary_stakeholders_variable_influence_interest
    - raci_matrix
    - power_interest_grid
    - communication_plan

  quality_checks:
    - check: raci_completeness
      description: Each activity must have one A and at least one R
      severity: blocking

    - check: contact_information
      description: Key stakeholders should have a contact channel or escalation route
      severity: warning

    - check: engagement_defined
      description: Each stakeholder must have engagement strategy
      severity: blocking

    - check: escalation_clear
      description: Escalation path must be defined
      severity: blocking

  automated_checks:
    - pattern: "\\[Stakeholder Name/Role\\]"
      expected: 0
      message: Replace all placeholder names

    - pattern: "Contact Channel|Escalation"
      expected: ">0"
      message: Include contact channel or escalation information

variables:
  - name: organization_name
    description: Name of the organization
    required: true

  - name: project_sponsor
    description: Executive sponsor name
    required: true

  - name: project_manager
    description: PM responsible for stakeholder management
    required: true

prompts:
  generation: prompt.md
  review: |
    Review stakeholder map for:
    1. Completeness of stakeholder identification
    2. Accuracy of influence assessment
    3. Clarity of RACI assignments
    4. Feasibility of communication plan
    5. Specificity of engagement strategies

template:
  file: template.md
  includes:
    - raci_matrix
    - power_interest_grid
    - communication_matrix

example:
  file: example.md

references:
  - title: "Atlassian RACI Chart"
    file: docs/resources/atlassian-raci-chart.md
    relationship: "Grounds responsibility assignment, accountability, consultation, and informed stakeholders"

workflow:
  creation_order: 0
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Project Manager
    - Sponsor

relationships:
  informs:
    - prd
    - risk-register

  updated_by:
    - organizational_changes
    - project_phases
    - stakeholder_feedback

engagement_levels:
  - inform: One-way communication
  - consult: Two-way communication
  - collaborate: Joint decision making
  - empower: Delegate decision authority

raci_rules:
  accountable:
    max_per_activity: 1
    must_be_assigned: true
  responsible:
    min_per_activity: 1
    can_be_multiple: true
  consulted:
    limit_to_necessary: true
  informed:
    keep_manageable: true

monitoring:
  metrics:
    - stakeholder_satisfaction
    - meeting_attendance
    - feedback_rate
    - issue_resolution_time

  review_triggers:
    - activity_transitions
    - major_decisions
    - stakeholder_changes
    - monthly_review

tags:
  - stakeholders
  - communication
  - engagement
  - raci
  - governance

version: 1.0.0
last_updated: 2024-01-14
