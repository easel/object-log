# Metadata for Threat Model

artifact:
  name: Threat Model
  id: threat-model
  type: document
  activity: frame

description: |
  Structured analysis of assets, data flows, trust boundaries, STRIDE threats,
  risk, mitigations, owners, and verification hooks.

output:
  location: docs/helix/01-frame/threat-model.md
  format: markdown
  naming: threat-model.md

validation:
  required_sections:
    - system_description
    - stride_threat_analysis
    - risk_assessment
    - mitigation_strategies

  quality_checks:
    - check: all_components_analyzed
      description: Every system component must be included in the threat analysis
      severity: blocking
    - check: stride_categories_complete
      description: All six STRIDE categories must be evaluated per component
      severity: blocking
    - check: risk_scores_calculated
      description: Risk scores must be calculated for each identified threat
      severity: warning
    - check: mitigations_defined
      description: Mitigation strategies must be defined for high and critical risks
      severity: warning

variables:
  - name: project_name
    description: Name of the project being threat-modeled
    required: true
  - name: system_components
    description: List of system components to analyze
    required: true
  - name: data_flows
    description: Data flow descriptions between components
    required: true
  - name: trust_boundaries
    description: Trust boundary definitions
    required: true
  - name: external_interfaces
    description: External system interfaces
    required: true
  - name: threat_actors
    description: Known or anticipated threat actors
    required: false
  - name: existing_security_controls
    description: Security controls already in place
    required: false
  - name: risk_tolerance
    description: Organization's risk tolerance level
    required: false
  - name: compliance_requirements
    description: Applicable compliance requirements
    required: false

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "OWASP Threat Modeling Cheat Sheet"
    file: docs/resources/owasp-threat-modeling-cheat-sheet.md
    relationship: "Grounds assets, data flows, trust boundaries, STRIDE, assumptions, and mitigation mapping"
  - title: "OWASP Application Security Verification Standard"
    file: docs/resources/owasp-asvs.md
    relationship: "Grounds mapping threat mitigations into verifiable security controls"

workflow:
  creation_order: 5
  review_cycles: 2
  approval_required: true
  approvers:
    - Security Champion
    - Technical Lead

relationships:
  informs:
    - solution-design
    - test-plan
  referenced_by:
    - adr

tags:
  - security
  - threat-modeling
  - stride
  - risk

version: 1.0.0
last_updated: 2024-01-14
