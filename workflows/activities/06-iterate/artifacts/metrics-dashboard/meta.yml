artifact:
  name: Metrics Dashboard
  id: metrics-dashboard
  type: document
  activity: iterate

description: |
  Iteration-level metrics summary that compares current values to a prior
  baseline and answers whether the latest change improved, regressed, or stayed
  within noise. It interprets existing metric definitions; it does not redefine
  metrics or choose backlog priorities.

output:
  location: docs/helix/06-iterate/metrics-dashboard.md
  format: markdown
  naming: metrics-dashboard.md

validation:
  required_sections:
    - decision
    - summary
    - metrics_table
    - interpretation_rules
    - trend_notes
    - follow_up

  quality_checks:
    - check: baseline_defined
      description: Comparison baseline must be explicit
      severity: blocking
    - check: source_linked
      description: Every metric must cite its definition or measurement source
      severity: blocking
    - check: actionability_defined
      description: The summary must state what to do next
      severity: warning

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "Google SRE: Monitoring Distributed Systems"
    file: docs/resources/google-sre-monitoring-distributed-systems.md
    relationship: "Grounds dashboard summaries as interpreted quantitative signals with clear sources"

workflow:
  creation_order: 1
  review_cycles: 1
  approval_required: true
  approvers:
    - Technical Lead
    - Product Owner

relationships:
  informed_by:
    - metric-definition
  informs:
    - improvement-backlog

tags:
  - iterate
  - metrics
  - dashboard
  - report

version: 1.0.0
last_updated: 2026-04-09
