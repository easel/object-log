# Metadata for Business Case

artifact:
  name: Business Case
  id: business-case
  type: document
  activity: discover

description: |
  Investment case for go/no-go decisions: market sizing, cost, return,
  alternatives, risk, and strategic fit.

output:
  location: docs/helix/00-discover/business-case.md
  format: markdown

validation:
  required_sections:
    - executive_summary
    - opportunity_sizing
    - investment_required
    - expected_roi
    - risk_assessment
    - strategic_alignment
    - recommendation

  quality_checks:
    - check: tam_sam_som_present
      description: Market sizing includes TAM, SAM, SOM
      severity: blocking

    - check: numbers_sourced
      description: Key numbers have sources cited
      severity: warning

    - check: risks_mitigated
      description: Each risk has mitigation strategy
      severity: blocking

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "APM Business Case Guidance"
    file: docs/resources/apm-business-case.md
    relationship: "Grounds benefits, costs, risks, alternatives, and preferred-option rationale"
  - title: "SBA Market Research and Competitive Analysis"
    file: docs/resources/sba-market-research-competitive-analysis.md
    relationship: "Grounds market sizing, pricing, demand, and competitive evidence expectations"

workflow:
  creation_order: 2
  review_cycles: 2-3
  approval_required: true
  approvers:
    - Sponsor
    - Finance Lead
    - Business Stakeholder

relationships:
  depends_on:
    - product-vision

  informs:
    - opportunity-canvas
    - prd
    - resource-summary

tags:
  - finance
  - investment
  - strategy
  - risk
