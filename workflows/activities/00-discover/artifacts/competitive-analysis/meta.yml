# Metadata for Competitive Analysis

artifact:
  name: Competitive Analysis
  id: competitive-analysis
  type: document
  activity: discover

description: |
  Market landscape and positioning analysis. Identifies direct rivals,
  substitutes, competitive pressure, and defensible differentiation.

output:
  location: docs/helix/00-discover/competitive-analysis.md
  format: markdown

validation:
  required_sections:
    - market_landscape
    - competitive_forces
    - competitor_profiles
    - feature_comparison
    - differentiation_strategy

  quality_checks:
    - check: competitors_minimum
      description: At least 3 competitors analyzed
      severity: blocking

    - check: matrix_complete
      description: Feature matrix has no empty cells
      severity: warning

    - check: differentiators_specific
      description: Differentiators are concrete, not vague
      severity: warning

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "SBA Market Research and Competitive Analysis"
    file: docs/resources/sba-market-research-competitive-analysis.md
    relationship: "Grounds market, competitor, pricing, and demand evidence expectations"
  - title: "HBS Five Forces"
    file: docs/resources/hbs-five-forces.md
    relationship: "Grounds competitive pressure, substitutes, entrants, buyers, and positioning"

workflow:
  creation_order: 2
  review_cycles: 1-2
  approval_required: false
  approvers:
    - Product Lead

relationships:
  depends_on:
    - product-vision

  informs:
    - business-case
    - opportunity-canvas
    - prd

tags:
  - market
  - competition
  - strategy
  - positioning
