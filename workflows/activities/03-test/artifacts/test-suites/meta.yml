artifact:
  name: Test Suites
  id: test-suites
  type: document
  activity: test

description: |
  Inventory of executable test suites with boundaries, coverage ownership,
  commands, runtime expectations, and evidence outputs.

output:
  location: docs/helix/03-test/test-suites.md
  format: markdown
  naming: test-suites.md

validation:
  required_sections:
    - suite_inventory
    - coverage_mapping
    - execution_commands
    - ownership
    - evidence

  quality_checks:
    - check: suites_have_entrypoints
      description: Each suite should identify how it is executed or reviewed
      severity: blocking
    - check: coverage_traceable
      description: Suites should trace to requirements, stories, risks, or acceptance criteria
      severity: warning

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "Practical Test Pyramid"
    file: docs/resources/fowler-practical-test-pyramid.md
    relationship: "Grounds suite balance across unit, integration, and end-to-end coverage"
  - title: "Google Test Sizes"
    file: docs/resources/google-test-sizes.md
    relationship: "Grounds runtime and dependency expectations for suite grouping"
  - title: "OpenAPI Specification"
    file: docs/resources/openapi-specification.md
    relationship: "Grounds API contract suites generated or checked against interface contracts"

relationships:
  informed_by:
    - test-plan
    - test-procedures
    - security-tests
  informs:
    - deployment-checklist

tags:
  - test
  - suites
  - coverage

version: 1.0.0
