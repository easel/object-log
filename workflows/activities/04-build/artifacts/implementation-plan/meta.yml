artifact:
  name: Implementation Plan
  id: implementation-plan
  type: document
  activity: build

description: |
  Build-activity plan that decomposes approved design into implementation slices,
  sequencing, ownership, validation gates, and evidence expectations. It turns
  story, design, and test artifacts into execution-ready build work without
  reopening product or design decisions.

output:
  location: docs/helix/04-build/implementation-plan.md
  format: markdown
  naming: implementation-plan.md

validation:
  required_sections:
    - scope
    - implementation_slices
    - issue_decomposition
    - validation_plan
    - risks_and_rollbacks

  quality_checks:
    - check: slices_bounded
      description: Implementation slices should be small enough for independent execution and review
      severity: blocking
    - check: validation_attached
      description: Each slice should name the validation or evidence required for completion
      severity: blocking

prompts:
  generation: prompt.md

template:
  file: template.md

example:
  file: example.md

references:
  - title: "Google Engineering Practices: Small CLs"
    file: docs/resources/google-small-cls.md
    relationship: "Grounds small, reviewable, rollback-friendly implementation slices with related tests"

relationships:
  informed_by:
    - prd
    - solution-design
    - technical-design
    - test-plan
    - story-test-plan
  informs:
    - release-notes
    - deployment-checklist

tags:
  - build
  - implementation
  - planning

version: 1.0.0
