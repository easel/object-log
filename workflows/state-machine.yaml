# HELIX Workflow State Machine
# Defines artifact ordering, parallelization strategy, and activity transitions
# Used by orchestrators to determine what to do next

version: 1
workflow: helix

# Activity definitions with artifact ordering
activities:
  - name: discover
    number: "00"
    description: Validate ideas and opportunities before committing to Frame
    artifacts:
      ordered:
        - product-vision      # Must come first - north star
        - business-case       # Justifies investment
        - competitive-analysis # Market positioning
      parallel:
        - opportunity-canvas  # Can be done alongside analysis
    entry_gate:
      automated:
        - check: idea_received
          type: manual  # Human provides initial idea
    exit_gate:
      automated:
        - check: file_exists
          path: docs/helix/00-discover/product-vision.md
        - check: file_exists
          path: docs/helix/00-discover/business-case.md
      manual:
        - "Investment decision approved"
    next_activity: frame

  - name: frame
    number: "01"
    description: Define WHAT to build and WHY
    artifacts:
      ordered:
        - prd                    # Problem definition first
        - principles             # Design principles
        - feature-specification  # Break down features
        - user-stories           # Actionable stories
      parallel:
        - stakeholder-map        # Can parallel with ordered
        - risk-register
        - compliance-requirements
        - security-requirements
        - threat-model
        - research-plan
        - feasibility-study
        - validation-checklist
    entry_gate:
      automated:
        - check: activity_complete
          activity: discover
    exit_gate:
      automated:
        - check: file_exists
          path: docs/helix/01-frame/prd.md
        - check: grep_absent
          pattern: "\\[NEEDS CLARIFICATION\\]"
          path: docs/helix/01-frame/**/*.md
        - check: user_stories_have_acceptance_criteria
      manual:
        - "PRD approved by product owner"
        - "Stakeholders aligned (RACI complete)"
    next_activity: design

  - name: design
    number: "02"
    description: Define HOW to build it
    artifacts:
      ordered:
        - architecture           # System-level first
        - solution-design        # Feature-level designs
        - technical-design       # Implementation details
        - contract               # Normative interface and schema contracts
      parallel:
        - adr                    # Decisions can be captured anytime
        - security-architecture
        - data-design
        - proof-of-concept
        - tech-spike
    entry_gate:
      automated:
        - check: activity_complete
          activity: frame
    exit_gate:
      automated:
        - check: file_exists
          path: docs/helix/02-design/architecture.md
        - check: dir_not_empty
          path: docs/helix/02-design/contracts
        - check: dir_not_empty
          path: docs/helix/02-design/adr
        - check: file_exists
          path: docs/helix/02-design/security-architecture.md
        - check: file_exists
          path: docs/helix/02-design/data-design.md
        - check: grep_absent
          pattern: "\\[NEEDS CLARIFICATION\\]"
          path: docs/helix/02-design/**/*.md
      manual:
        - "Architecture reviewed by tech lead"
    next_activity: test

  - name: test
    number: "03"
    description: Write failing tests (TDD Red activity)
    artifacts:
      ordered:
        - test-plan              # Strategy first
        - test-procedures        # How to test
        - test-suites            # Actual test files
      parallel:
        - story-test-plan        # Per-story plans
        - security-tests         # Security test suite
    entry_gate:
      automated:
        - check: activity_complete
          activity: design
    exit_gate:
      automated:
        - check: file_exists
          path: docs/helix/03-test/test-plan.md
        - check: tests_exist
          path: tests/
        - check: tests_failing
          message: "Tests must fail before implementation (TDD)"
      manual: []
    next_activity: build

  - name: build
    number: "04"
    description: Implement code to pass tests (TDD Green activity)
    artifacts:
      ordered:
        - implementation-plan    # Plan the build; story-level work decomposed into tracker issues
    entry_gate:
      automated:
        - check: activity_complete
          activity: test
        - check: tests_failing
          message: "Must have failing tests to implement against"
    exit_gate:
      automated:
        - check: tests_passing
          path: tests/
        - check: coverage_threshold
          minimum: 80
        - check: security_scan_clean
      manual:
        - "Code review completed"
    next_activity: deploy

  - name: deploy
    number: "05"
    description: Release to production with monitoring
    artifacts:
      ordered:
        - deployment-checklist   # Technical go/no-go for rollout
        - monitoring-setup       # Proves the rollout is observable
        - runbook                # Operator rollback and recovery guidance
        - release-notes          # User and operator communication
      parallel: []
    entry_gate:
      automated:
        - check: activity_complete
          activity: build
        - check: tests_passing
    exit_gate:
      automated:
        - check: deployment_verified
        - check: monitoring_active
      manual:
        - "Go/no-go decision by stakeholders"
        - "Release notes published"
    next_activity: iterate

  - name: iterate
    number: "06"
    description: Learn from production, plan next cycle
    artifacts:
      ordered:
        - metrics-dashboard      # Collect data
        - security-metrics       # Security-specific learnings
        - improvement-backlog    # Plan improvements
      parallel: []
    entry_gate:
      automated:
        - check: activity_complete
          activity: deploy
    exit_gate:
      automated:
        - check: file_exists
          path: docs/helix/06-iterate/improvement-backlog.md
      manual:
        - "Next iteration scope decided"
    next_activity: frame  # Loop back

# Story-level state machine (parallel to project-level)
story_flow:
  prefixes:
    user_story: US
    technical_design: TD
    test_plan: TP
    # Runtime-neutral descriptions: "tracker issue" means any issue-tracking
    # system. Concrete per-runtime commands live in each runtime's install
    # guide (DDx: docs/install/ddx.md).
    implementation_issue: "tracker issue labeled activity:build"
    deployment_issue: "tracker issue labeled activity:deploy"
    iterate_evidence: "all deploy issue(s) complete with no matching deploy issue remaining not closed, plus optional linked tracker follow-on work; canonical iterate outputs remain shared iteration context"

  transitions:
    - from: US-{id}
      to: TD-{id}
      activity_change: frame -> design
    - from: TD-{id}
      to: STP-{id}
      activity_change: design -> test
    - from: STP-{id}
      to: "tracker issue(s) labeled helix, activity:build, story:US-{id}"
      activity_change: test -> build
    - from: "tracker issue(s) labeled helix, activity:build, story:US-{id}"
      to: "tracker issue(s) labeled helix, activity:deploy, story:US-{id}"
      activity_change: build -> deploy
    - from: "tracker issue(s) labeled helix, activity:deploy, story:US-{id}"
      to: "all deploy issue(s) complete for story US-{id} with no matching deploy issue remaining not closed; optional linked tracker follow-on work"
      activity_change: deploy -> iterate

  state_detection:
    rule: "Story activity = activity of latest artifact with matching ID"
    example: |
      If exists US-036: Story is in FRAME
      If exists TD-036: Story is in DESIGN
      If exists STP-036: Story is in TEST
      If open HELIX build issues exist for story US-036: Story is in BUILD
      If any HELIX deploy issue for story US-036 is not closed, including status: in_progress: Story is in DEPLOY
      If all deploy issues for story US-036 are complete and no matching deploy issue remains not closed: Story is in ITERATE
      Linked tracker follow-on work adds iterate evidence when present; canonical iterate outputs remain shared iteration context and are not queried by story ID

# Parallelization rules
parallelization:
  story_level:
    description: "Stories without shared dependencies can be parallel"
    conflict_detection:
      - shared_module_changes
      - shared_api_changes
      - shared_database_changes
    max_parallel_stories: 5

  artifact_level:
    description: "Parallel artifacts within an activity can be worked simultaneously"
    example: "stakeholder-map and risk-register can be done in parallel"

# Error states and recovery
error_handling:
  gate_failure:
    action: log_failure
    retry: 3
    escalate_after: 3
    escalate_to: human

  test_failure:
    action: trigger_refinement
    refinement_type: bugs

  deployment_failure:
    action: rollback
    notify: stakeholders

# Refinement triggers (loop back to earlier activity)
refinement:
  triggers:
    - condition: test_failure_persistent
      threshold: 3
      action: refine_to_design
    - condition: integration_conflict
      action: refine_to_frame
    - condition: requirements_change
      action: refine_to_frame

  process:
    - identify_issue_type
    - determine_target_activity
    - create_refinement_story
    - link_to_original
