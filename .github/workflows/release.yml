name: Release

# Publishes to crates.io when a version tag (v0.1.0, …) is pushed.
# Requires the repo secret CARGO_REGISTRY_TOKEN (crates.io API token).
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
